<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <linearGradient id="btngrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6b9a"/>
      <stop offset="100%" stop-color="#0d4d73"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4aaad8"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecb71"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="18" letter-spacing="4" fill="#7fd4f7" filter="url(#glow)">PROOF OF RESERVES</text>
  <text x="450" y="62" text-anchor="middle" font-size="11" letter-spacing="2" fill="#3a5a70">Zero-Knowledge Solvency Verification on Stellar</text>
  <rect x="340" y="72" width="220" height="18" rx="3" fill="#1a3a5a"/>
  <text x="450" y="85" text-anchor="middle" font-size="9" letter-spacing="2" fill="#4aaad8">STELLAR TESTNET — PROTOCOL 26</text>

  <!-- ── Box: Issuer / User ── -->
  <rect x="30" y="120" width="150" height="80" rx="6" fill="#131922" stroke="#1e2d40" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">ISSUER</text>
  <text x="105" y="168" text-anchor="middle" font-size="12" fill="#e0e6f0">5 Accounts</text>
  <text x="105" y="185" text-anchor="middle" font-size="10" fill="#3a5a70">Balances Private</text>

  <!-- ── Box: Frontend ── -->
  <rect x="240" y="105" width="160" height="110" rx="6" fill="#131922" stroke="#2a8abf" stroke-width="1.5"/>
  <text x="320" y="130" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">FRONTEND</text>
  <text x="320" y="152" text-anchor="middle" font-size="12" fill="#e0e6f0">index.html</text>
  <rect x="256" y="162" width="128" height="22" rx="4" fill="url(#btngrad)" stroke="#2a8abf" stroke-width="1"/>
  <text x="320" y="177" text-anchor="middle" font-size="9" fill="#e0f0ff">Fetch Balances</text>
  <rect x="256" y="188" width="128" height="22" rx="4" fill="url(#btngrad)" stroke="#2a8abf" stroke-width="1"/>
  <text x="320" y="203" text-anchor="middle" font-size="9" fill="#e0f0ff">Verify Solvency On-Chain</text>

  <!-- ── Box: Backend / Express ── -->
  <rect x="470" y="85" width="175" height="150" rx="6" fill="#131922" stroke="#1e2d40" stroke-width="1"/>
  <text x="557" y="110" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">BACKEND (RAILWAY)</text>
  <text x="557" y="130" text-anchor="middle" font-size="12" fill="#e0e6f0">Express + snarkjs</text>
  <line x1="480" y1="140" x2="634" y2="140" stroke="#1e2d40" stroke-width="1"/>
  <text x="490" y="157" font-size="9" fill="#3a5a70">/api/fetch-balances</text>
  <text x="490" y="173" font-size="9" fill="#3a5a70">/api/generate-proof</text>
  <text x="490" y="189" font-size="9" fill="#3a5a70">/api/submit-proof</text>
  <text x="490" y="205" font-size="9" fill="#3a5a70">/api/fetch-reserve</text>
  <text x="490" y="221" font-size="9" fill="#3a5a70">GET / (static frontend)</text>

  <!-- ── Box: ZK Circuit ── -->
  <rect x="470" y="265" width="175" height="90" rx="6" fill="#131922" stroke="#1e2d40" stroke-width="1"/>
  <text x="557" y="290" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">ZK CIRCUIT</text>
  <text x="557" y="310" text-anchor="middle" font-size="12" fill="#e0e6f0">Groth16 / BN128</text>
  <text x="557" y="328" text-anchor="middle" font-size="9" fill="#3a5a70">reserves.circom</text>
  <text x="557" y="344" text-anchor="middle" font-size="9" fill="#3a5a70">reserves_final.zkey</text>

  <!-- ── Box: Stellar Horizon ── -->
  <rect x="700" y="105" width="170" height="75" rx="6" fill="#131922" stroke="#1e2d40" stroke-width="1"/>
  <text x="785" y="130" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">STELLAR HORIZON</text>
  <text x="785" y="150" text-anchor="middle" font-size="11" fill="#e0e6f0">XLM Balances</text>
  <text x="785" y="167" text-anchor="middle" font-size="9" fill="#3a5a70">horizon-testnet.stellar.org</text>

  <!-- ── Box: Soroban Contract ── -->
  <rect x="700" y="210" width="170" height="100" rx="6" fill="#131922" stroke="#2a8abf" stroke-width="1.5"/>
  <text x="785" y="235" text-anchor="middle" font-size="9" letter-spacing="2" fill="#5a7a99">SOROBAN CONTRACT</text>
  <text x="785" y="255" text-anchor="middle" font-size="11" fill="#e0e6f0">verify_solvency()</text>
  <text x="785" y="273" text-anchor="middle" font-size="9" fill="#3a5a70">Groth16 verifier in Rust</text>
  <text x="785" y="290" text-anchor="middle" font-size="9" fill="#3a5a70">soroban-testnet.stellar.org</text>

  <!-- ── Result boxes ── -->
  <rect x="240" y="390" width="160" height="50" rx="6" fill="#0a2014" stroke="#1a6b3a" stroke-width="1.5"/>
  <text x="320" y="417" text-anchor="middle" font-size="14" fill="#4ecb71" letter-spacing="2">SOLVENT ✓</text>
  <text x="320" y="432" text-anchor="middle" font-size="9" fill="#4ecb71" opacity="0.7">reserves ≥ liabilities</text>

  <rect x="420" y="390" width="160" height="50" rx="6" fill="#20080a" stroke="#6b1a20" stroke-width="1.5"/>
  <text x="500" y="417" text-anchor="middle" font-size="14" fill="#e05050" letter-spacing="2">INSOLVENT ✗</text>
  <text x="500" y="432" text-anchor="middle" font-size="9" fill="#e05050" opacity="0.7">reserves &lt; liabilities</text>

  <!-- ── Stellar Expert link ── -->
  <rect x="300" y="460" width="300" height="36" rx="6" fill="#131922" stroke="#1e2d40" stroke-width="1"/>
  <text x="450" y="476" text-anchor="middle" font-size="9" letter-spacing="1" fill="#5a7a99">ON-CHAIN PROOF</text>
  <text x="450" y="490" text-anchor="middle" font-size="9" fill="#4aaad8">stellar.expert/explorer/testnet/tx/...</text>

  <!-- ── Arrows ── -->

  <!-- Issuer → Frontend -->
  <line x1="180" y1="160" x2="238" y2="160" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="209" y="153" text-anchor="middle" font-size="8" fill="#3a5a70">addresses</text>

  <!-- Frontend → Backend (fetch balances) -->
  <line x1="400" y1="145" x2="468" y2="145" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="434" y="138" text-anchor="middle" font-size="8" fill="#3a5a70">POST /api/fetch-balances</text>

  <!-- Frontend → Backend (generate + submit) -->
  <line x1="400" y1="175" x2="468" y2="175" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="434" y="192" text-anchor="middle" font-size="8" fill="#3a5a70">POST /api/generate-proof</text>
  <text x="434" y="203" text-anchor="middle" font-size="8" fill="#3a5a70">POST /api/submit-proof</text>

  <!-- Backend → Horizon -->
  <line x1="645" y1="130" x2="698" y2="135" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="671" y="124" text-anchor="middle" font-size="8" fill="#3a5a70">GET /accounts/:id</text>

  <!-- Backend → ZK Circuit -->
  <line x1="557" y1="235" x2="557" y2="263" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="600" y="252" font-size="8" fill="#3a5a70">fullProve(balances)</text>

  <!-- ZK Circuit → Backend (proof back) -->
  <line x1="540" y1="263" x2="540" y2="237" stroke="#4ecb71" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,3"/>
  <text x="460" y="252" font-size="8" fill="#3a5a70">{ proof, publicSignals }</text>

  <!-- Backend → Soroban Contract -->
  <line x1="645" y1="200" x2="698" y2="235" stroke="#4aaad8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="671" y="213" text-anchor="middle" font-size="8" fill="#3a5a70">verify_solvency()</text>

  <!-- Contract → Frontend (result) -->
  <line x1="785" y1="310" x2="785" y2="370" stroke="#4ecb71" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="785" y1="370" x2="415" y2="415" stroke="#4ecb71" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <text x="660" y="367" font-size="8" fill="#3a5a70">isSolvent, txHash</text>

  <!-- Watermark -->
  <text x="870" y="530" text-anchor="end" font-size="8" fill="#1e2d40">proof-of-reserves on Stellar</text>
</svg>
